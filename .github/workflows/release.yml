name: Build & Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install arcade pyinstaller

      - name: Generate version
        id: version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          $sha = git rev-parse --short HEAD
          $ver = "v$date-$sha"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --noconsole --name "GarrisonProtocol" `
            --add-data "game/assets;game/assets" `
            --hidden-import arcade `
            --collect-all arcade `
            --copy-metadata arcade `
            run.py

      - name: Package release zip
        run: Compress-Archive -Path dist/GarrisonProtocol/* -DestinationPath dist/GarrisonProtocol.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/GarrisonProtocol.zip
          generate_release_notes: true
