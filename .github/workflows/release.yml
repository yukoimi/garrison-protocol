name: Build & Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install arcade nuitka

      - name: Cache Nuitka build
        uses: actions/cache@v4
        with:
          path: |
            ~\.cache\Nuitka
            ~\AppData\Local\Nuitka\Nuitka
          key: ${{ runner.os }}-nuitka-v1
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Generate version
        id: version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          $sha = git rev-parse --short HEAD
          $ver = "v$date-$sha"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Build with Nuitka
        run: >
          nuitka --standalone --windows-console-mode=disable
          --assume-yes-for-downloads
          --include-package=arcade
          --include-data-dir=game/assets=game/assets
          --output-dir=dist
          run.py

      - name: Package release zip
        run: Compress-Archive -Path dist/run.dist/* -DestinationPath dist/GarrisonProtocol.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/GarrisonProtocol.zip
          generate_release_notes: true
